<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | Mydi Delivery</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script> <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div id="login-screen" style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #f4f7f6; font-family: 'Poppins', sans-serif; position: fixed; width: 100%; top: 0; left: 0; z-index: 9999;">
    <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px;">
        <h2 style="margin-bottom: 10px; color: #333;">Mydi Admin</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 20px;">Acesso Restrito</p>
        <input type="password" id="admin-pass" placeholder="Digite a senha" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; outline: none; text-align: center; font-size: 18px;">
        <button onclick="verificarAcesso()" style="width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s;">ENTRAR</button>
    </div>
</div>

<div id="panel-content" style="display: none;">
    <div class="container">
        <header class="header-admin">
            <div class="header-info">
                <h1>Gestão Mydi Delivery</h1>
                <p>Monitoramento de Vendas e Mensalidades</p>
            </div>
            <div class="header-date">
                <span id="data-atual"></span>
            </div>
        </header>

        <div class="grid-stats">
            <div class="card-stat">
                <h4>Comissões (10%)</h4>
                <p id="total-comissoes">R$ 0,00</p>
            </div>
            <div class="card-stat" style="border-left-color: #27ae60;">
                <h4>Mensalidades Fixas</h4>
                <p id="total-fixo">R$ 0,00</p>
            </div>
            <div class="card-stat" style="border-left-color: #f1c40f;">
                <h4>Total a Receber</h4>
                <p id="total-geral" style="color: #27ae60;">R$ 0,00</p>
            </div>
        </div>

        <div class="main-table">
            <div class="table-header">
                <h3>Faturamento em Tempo Real</h3>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Restaurante</th>
                        <th>Vendas Brutas</th>
                        <th>Comissão (10%)</th>
                        <th>Mensalidade</th>
                        <th>Total Devido</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-clientes"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="script.js"></script>
